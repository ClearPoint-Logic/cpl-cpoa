language: en-US

early_access: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  suggested_reviewers: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/.next/**"
    - "!**/node_modules/**"

pre_merge_checks:
  docstrings:
    mode: warning
  title:
    mode: warning
  description:
    mode: warning
  issue_assessment:
    mode: warning
  custom_checks: []
  override_requested_reviewers_only: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  linear:
    usage: auto

