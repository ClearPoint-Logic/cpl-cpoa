name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Coverage threshold
        run: |
          coverage run --source=cpoa,agents,mcp_servers,app -m pytest -q
          coverage report --fail-under=88

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - python
      - web
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.python.result }}" != "success" ]; then
            echo "Python failed with result: ${{ needs.python.result }}"
            exit 1
          fi
          if [ "${{ needs.web.result }}" != "success" ]; then
            echo "Web failed with result: ${{ needs.web.result }}"
            exit 1
          fi
