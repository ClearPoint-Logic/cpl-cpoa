name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint + full test suite (unit / integration / evals / security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio coverage

      - name: Lint (ruff)
        run: ruff check .

      - name: Full pytest suite (unit + integration + evals + security)
        run: pytest -q

      - name: Coverage threshold (90%)
        run: |
          coverage run --source=cpoa,agents,mcp_servers,app -m pytest -q
          coverage report --fail-under=90

  web:
    name: Web — Next.js build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
