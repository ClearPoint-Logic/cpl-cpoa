name: CI

on:
  push:
    branches: [main, stream-a-logic, stream-b-mcp-deploy, stream-c-ui-submission, submission-cut]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Lint, schemas, evals, security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests + schema validation
        run: pytest tests/unit -q

      - name: Fixture decision evals
        run: pytest tests/evals -q

      - name: MCP security tests
        run: pytest tests/security -q
